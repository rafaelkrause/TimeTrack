{% extends "base.html" %}
{% block title %}Configura&#231;&#245;es — Job Tracker{% endblock %}
{% block content %}

<h5 class="mb-3">Configura&#231;&#245;es</h5>

<!-- Shifts -->
<div class="card mb-3">
    <div class="card-header py-2"><small class="fw-semibold">Turnos de Trabalho</small></div>
    <div class="card-body">
        <div id="shifts-config"></div>
        <button class="btn btn-primary btn-sm mt-3" onclick="saveShifts()">
            <i class="bi bi-check-lg"></i> Salvar Turnos
        </button>
    </div>
</div>

<!-- General -->
<div class="card mb-3">
    <div class="card-header py-2"><small class="fw-semibold">Geral</small></div>
    <div class="card-body">
        <div class="row g-3">
            <div class="col-auto">
                <label class="form-label small">Seu nome</label>
                <input type="text" class="form-control form-control-sm" id="user-name"
                       value="{{ config.get('user_name', '') }}" placeholder="Ex: Maria" style="width:180px" maxlength="100">
            </div>
            <div class="col-auto">
                <label class="form-label small">Meta de apontamento (%)</label>
                <input type="number" class="form-control form-control-sm" id="target-percentage"
                       min="0" max="100" value="{{ config.get('target_percentage', 90) }}" style="width:100px">
            </div>
            <div class="col-auto">
                <label class="form-label small">Porta do servidor</label>
                <input type="number" class="form-control form-control-sm" id="server-port"
                       value="{{ config.get('port', 5000) }}" style="width:100px">
                <small class="text-body-secondary">Requer reinicializa&#231;&#227;o</small>
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="phrases-enabled"
                           {% if config.get('phrases_enabled', True) %}checked{% endif %}>
                    <label class="form-check-label small" for="phrases-enabled">
                        Mostrar frases descontra&#237;das ao pausar e finalizar atividades
                    </label>
                </div>
            </div>
        </div>
        <button class="btn btn-primary btn-sm mt-3" onclick="saveGeneral()">
            <i class="bi bi-check-lg"></i> Salvar
        </button>
    </div>
</div>

<!-- Export -->
<div class="card mb-3">
    <div class="card-header py-2"><small class="fw-semibold">Exportar Dados</small></div>
    <div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-auto">
                <label class="form-label small">De</label>
                <input type="date" class="form-control form-control-sm" id="export-from">
            </div>
            <div class="col-auto">
                <label class="form-label small">At&#233;</label>
                <input type="date" class="form-control form-control-sm" id="export-to">
            </div>
            <div class="col-auto">
                <label class="form-label small">Formato</label>
                <select class="form-select form-select-sm" id="export-format">
                    <option value="csv">CSV</option>
                    <option value="tsv">TSV (Tab)</option>
                </select>
            </div>
            <div class="col-auto">
                <button class="btn btn-primary btn-sm" onclick="exportFromSettings()">
                    <i class="bi bi-download"></i> Exportar
                </button>
            </div>
        </div>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script>document.addEventListener('DOMContentLoaded', loadShifts);</script>
{% endblock %}
