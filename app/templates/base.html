<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar bg-body-tertiary border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-clock-history"></i>
                <span>Job Tracker</span>
            </a>
            <div class="d-flex align-items-center gap-2">
                <a class="btn btn-sm {% if request.path == '/' %}btn-primary{% else %}btn-outline-secondary{% endif %}"
                   href="/">Dashboard</a>
                <a class="btn btn-sm {% if request.path == '/settings' %}btn-primary{% else %}btn-outline-secondary{% endif %}"
                   href="/settings">
                    <i class="bi bi-gear"></i> Config
                </a>
                <button class="btn btn-sm btn-outline-secondary" id="theme-toggle" title="Alternar tema">
                    <i class="bi bi-circle-half"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container-fluid py-3" style="max-width: 960px;">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
